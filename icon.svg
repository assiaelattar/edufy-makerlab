<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3a5c"/>
      <stop offset="100%" style="stop-color:#ea223f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="114" ry="114" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.07" fill="#60a5fa">
    <circle cx="80" cy="80" r="3"/><circle cx="160" cy="80" r="3"/><circle cx="240" cy="80" r="3"/>
    <circle cx="320" cy="80" r="3"/><circle cx="400" cy="80" r="3"/><circle cx="432" cy="80" r="3"/>
    <circle cx="80" cy="160" r="3"/><circle cx="432" cy="160" r="3"/>
    <circle cx="80" cy="352" r="3"/><circle cx="432" cy="352" r="3"/>
    <circle cx="80" cy="432" r="3"/><circle cx="160" cy="432" r="3"/><circle cx="240" cy="432" r="3"/>
    <circle cx="320" cy="432" r="3"/><circle cx="400" cy="432" r="3"/><circle cx="432" cy="432" r="3"/>
  </g>

  <!-- Orbit ring -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="none" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="140" ry="140" fill="none" stroke="#334155" stroke-width="1" opacity="0.3"/>

  <!-- Small accent dots on orbit -->
  <circle cx="256" cy="56" r="5" fill="url(#accent)" opacity="0.7" filter="url(#glow)"/>
  <circle cx="456" cy="256" r="5" fill="url(#accent)" opacity="0.7" filter="url(#glow)"/>
  <circle cx="256" cy="456" r="5" fill="#ea223f" opacity="0.7" filter="url(#glow)"/>
  <circle cx="56" cy="256" r="5" fill="url(#accent)" opacity="0.7" filter="url(#glow)"/>

  <!-- M letterform — two triangular peaks + base bar -->
  <!-- Left leg -->
  <polygon points="96,370 96,165 164,280 256,152 348,280 416,165 416,370" fill="none" stroke="url(#red)" stroke-width="0" opacity="0"/>

  <!-- Main M shape using paths -->
  <!-- Left vertical bar -->
  <rect x="96" y="152" width="52" height="210" rx="8" fill="url(#red)" filter="url(#glow)"/>
  <!-- Right vertical bar -->
  <rect x="364" y="152" width="52" height="210" rx="8" fill="url(#red)" filter="url(#glow)"/>
  <!-- Left diagonal strut (top-left to center bottom) -->
  <polygon points="96,152 148,152 256,290 256,360 208,360" fill="url(#red)" filter="url(#glow)"/>
  <!-- Right diagonal strut (top-right to center bottom) -->
  <polygon points="364,152 416,152 304,360 256,360 256,290" fill="url(#red)" filter="url(#glow)"/>

  <!-- Center bottom point accent glow -->
  <circle cx="256" cy="330" r="18" fill="#ff3a5c" opacity="0.35" filter="url(#glow)"/>

  <!-- Top bar connecting peaks -->
  <rect x="96" y="152" width="320" height="0" rx="4" fill="url(#red)"/>

  <!-- Accent blue dash — bottom left corner decoration -->
  <rect x="96" y="390" width="80" height="6" rx="3" fill="url(#accent)" opacity="0.6"/>
  <!-- Accent blue dash — bottom right -->
  <rect x="336" y="390" width="80" height="6" rx="3" fill="url(#accent)" opacity="0.6"/>
</svg>